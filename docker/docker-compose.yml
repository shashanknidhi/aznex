services:
  service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.service
    ports:
      - "3000:3000"
    volumes:
      - aznex-data:/app/data
    environment:
      - DATABASE_PATH=/app/data/aznex.db
      # GitHub App credentials for repo access verification — see .env.example
      # - GITHUB_APP_ID=
      # - GITHUB_APP_PRIVATE_KEY=
    restart: unless-stopped

volumes:
  aznex-data:
