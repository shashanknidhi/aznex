services:
  service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.service
    ports:
      - "3000:3000"
    volumes:
      - aznex-data:/app/data
    # Copy .env.example → .env at the repo root and fill in GitHub App/OAuth
    # credentials and BETTER_AUTH_SECRET — see .env.example for the full list.
    env_file:
      - ../.env
    environment:
      # Keep the DB on the volume regardless of what .env says.
      - DATABASE_PATH=/app/data/aznex.db
    restart: unless-stopped

volumes:
  aznex-data:
