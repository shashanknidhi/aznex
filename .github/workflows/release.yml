name: Release

# Publishes @aznex/shared and @aznex/worker to npm via OIDC trusted publishing
# (no token secret). Trigger: push a tag like v0.1.1, or run manually.
# Railway deployment is separate — it auto-deploys every push to main.
#
# One-time setup on npmjs.com, per package (Settings → Trusted Publisher):
#   GitHub Actions · repo shashanknidhi/aznex · workflow release.yml

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC token for npm trusted publishing

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Trusted publishing needs npm >= 11.5.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install

      - name: Gate on typecheck + tests
        run: bun run typecheck && bun test

      - name: Verify tag matches package versions
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          for pkg in shared worker; do
            VERSION=$(jq -r .version packages/$pkg/package.json)
            if [ "$VERSION" != "$TAG" ]; then
              echo "::error::packages/$pkg is $VERSION but tag is $TAG — bump versions before tagging"
              exit 1
            fi
          done

      - name: Publish (skips versions already on npm)
        run: |
          for pkg in shared worker; do   # shared first — worker depends on it
            NAME=$(jq -r .name packages/$pkg/package.json)
            VERSION=$(jq -r .version packages/$pkg/package.json)
            if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
              echo "$NAME@$VERSION already published — skipping"
              continue
            fi
            # bun pm pack rewrites the workspace:* dependency; npm publish
            # (unlike bun publish) speaks OIDC trusted publishing + provenance.
            (cd packages/$pkg && bun pm pack --destination /tmp/release)
            npm publish "/tmp/release/$(echo "$NAME" | tr -d '@' | tr '/' '-')-$VERSION.tgz" --provenance --access public
          done
