name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shared:
    name: "@aznex/shared"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bunx tsc --noEmit -p packages/shared/tsconfig.json

      - name: Test
        run: bun test packages/shared
